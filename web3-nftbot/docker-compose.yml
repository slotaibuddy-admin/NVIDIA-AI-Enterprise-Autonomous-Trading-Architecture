services:

  # ─── Core NFT trading bot (GPU-enabled) ──────────────────────────────────
  nftbot-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: nftbot-core:latest
    container_name: nftbot-core
    restart: unless-stopped
    command: ["python3", "-m", "bots.nft_bot"]
    environment:
      - WALLET_PRIVATE_KEY=${WALLET_PRIVATE_KEY}
      - WEB3_RPC_URL=${WEB3_RPC_URL}
      - REDIS_URL=redis://redis-cache:6379/0
      - DATABASE_URL=postgresql://nftbot:${DB_PASSWORD}@postgres-db:5432/nftbot
      - CONFIG_PATH=/app/config/config.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - redis-cache
      - postgres-db
      - agent-engine
    networks:
      - nftflow-net
    ports:
      - "8000:8000"

  # ─── AI Agent inference engine (GPU-enabled) ─────────────────────────────
  agent-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-engine:latest
    container_name: agent-engine
    restart: unless-stopped
    command: ["python3", "-m", "agents.market_agent", "--serve"]
    environment:
      - REDIS_URL=redis://redis-cache:6379/0
      - DATABASE_URL=postgresql://nftbot:${DB_PASSWORD}@postgres-db:5432/nftbot
      - CONFIG_PATH=/app/config/config.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - redis-cache
      - postgres-db
    networks:
      - nftflow-net
    ports:
      - "8001:8001"

  # ─── NFTflow orchestration service ───────────────────────────────────────
  flow-runner:
    build:
      context: .
      dockerfile: Dockerfile
    image: flow-runner:latest
    container_name: flow-runner
    restart: unless-stopped
    command: ["python3", "-m", "flow.runner"]
    environment:
      - REDIS_URL=redis://redis-cache:6379/0
      - DATABASE_URL=postgresql://nftbot:${DB_PASSWORD}@postgres-db:5432/nftbot
      - CONFIG_PATH=/app/config/config.yaml
      - FLOW_PATH=/app/flow/nftflow.yaml
    depends_on:
      - redis-cache
      - postgres-db
      - nftbot-core
      - agent-engine
    networks:
      - nftflow-net
    ports:
      - "8002:8002"

  # ─── Redis cache (event bus + fast data) ─────────────────────────────────
  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    networks:
      - nftflow-net
    ports:
      - "6379:6379"

  # ─── PostgreSQL database (trade history + portfolio) ─────────────────────
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nftbot
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=nftbot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nftflow-net
    ports:
      - "5432:5432"

  # ─── Prometheus metrics & monitoring ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - nftflow-net
    ports:
      - "9090:9090"

networks:
  nftflow-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
